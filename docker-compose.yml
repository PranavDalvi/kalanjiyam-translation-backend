services:
  translation-api:
    build: .
    container_name: kalanjiyam-translation-api
    ports:
      - "8888:8888"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ${GLOSSARIES_DIR:-./glossaries}:/app/glossaries
    environment:
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-1}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-1}
      - HF_TOKEN=${HF_TOKEN:-}
      - GLOSSARIES_DIR=glossaries
      - MAX_CONCURRENT_TRANSLATIONS=${MAX_CONCURRENT_TRANSLATIONS:-2}
      - AUTO_SELECT_GPU=${AUTO_SELECT_GPU:-1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: always
